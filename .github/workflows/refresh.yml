name: Refresh AI 24h Radar Data

on:
  schedule:
    # Every day at 07:00 Asia/Shanghai (23:00 UTC previous day)
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh snapshot data
        run: npm run update:snapshot

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshot.json
          git diff --staged --quiet || git commit -m "chore: refresh radar snapshot data"
          git push
